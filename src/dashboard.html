<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CN31 Token</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <!-- Left Side - Stats -->
            <div class="stats-side">
                <div class="logo">
                    <i class='bx bx-code-alt'></i>
                    CN31 <span>Token</span>
                    <span class="badge">v2.0</span>
                </div>
                
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="value green" id="queueCount">0</div>
                        <div class="label"><i class='bx bx-layer'></i> Queue</div>
                    </div>
                    <div class="stat-card">
                        <div class="value blue" id="receivedCount">0</div>
                        <div class="label"><i class='bx bx-download'></i> Received</div>
                    </div>
                    <div class="stat-card">
                        <div class="value orange" id="servedCount">0</div>
                        <div class="label"><i class='bx bx-check-circle'></i> Served</div>
                    </div>
                    <div class="stat-card">
                        <div class="value pink" id="expiredCount">0</div>
                        <div class="label"><i class='bx bx-time'></i> Expired</div>
                    </div>
                </div>
                
                <div class="progress-section">
                    <div class="label-row">
                        <span><i class='bx bx-data'></i> Queue Capacity</span>
                        <span id="queueProgressText">0 / 0</span>
                    </div>
                    <div class="progress-bar">
                        <div class="fill" id="queueProgressFill" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="info-row">
                    <span><i class='bx bx-timer'></i> <strong id="uptime">0s</strong> uptime</span>
                    <span><i class='bx bx-flash'></i> <strong id="tokensPerMin">0</strong> tokens/min</span>
                    <span><i class='bx bx-trending-up'></i> <strong id="peakQueue">0</strong> peak</span>
                </div>
                
                <div class="api-endpoints">
                    <h4><i class='bx bx-terminal'></i> API Endpoints</h4>
                    <span class="endpoint"><span class="method">POST</span> /api/save-token</span>
                    <span class="endpoint"><span class="method">GET</span> /api/get-token</span>
                    <span class="endpoint"><span class="method">GET</span> /api/token/bulk?n=5</span>
                    <span class="endpoint"><span class="method">GET</span> /api/status</span>
                    <span class="endpoint"><span class="method">DELETE</span> /api/tokens</span>
                </div>
            </div>
            
            <!-- Right Side - Tokens -->
            <div class="tokens-side">
                <div class="tokens-header">
                    <h3><i class='bx bx-list-ul'></i> Recent Tokens</h3>
                    <span class="count" id="tokenCount"><i class='bx bx-layer'></i> 0 in queue</span>
                </div>
                <div class="tokens-list" id="tokenList">
                    <div class="empty-state"><i class='bx bx-inbox'></i> No tokens in queue</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-refresh every 2 seconds
        function fetchData() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    // Update stats
                    document.getElementById('queueCount').textContent = data.queue_size;
                    document.getElementById('receivedCount').textContent = data.total_received;
                    document.getElementById('servedCount').textContent = data.total_served;
                    document.getElementById('expiredCount').textContent = data.total_expired;
                    document.getElementById('uptime').textContent = data.uptime_seconds + 's';
                    document.getElementById('tokensPerMin').textContent = data.tokens_per_minute;
                    document.getElementById('peakQueue').textContent = data.peak_queue;
                    document.getElementById('tokenCount').innerHTML = '<i class="bx bx-layer"></i> ' + data.queue_size + ' in queue';
                    
                    // Update progress bar
                    const peak = data.peak_queue || 1;
                    const pct = Math.min((data.queue_size / peak) * 100, 100);
                    document.getElementById('queueProgressFill').style.width = pct + '%';
                    document.getElementById('queueProgressText').textContent = data.queue_size + ' / ' + peak;
                    
                    // Update token list
                    const tokenList = document.getElementById('tokenList');
                    if (data.recent_tokens && data.recent_tokens.length > 0) {
                        let html = '';
                        data.recent_tokens.forEach(item => {
                            const age = item.age;
                            let color, status, icon;
                            if (age < 60) {
                                color = '#34d399';
                                status = 'Fresh';
                                icon = '<i class="bx bx-check-circle" style="color:#34d399"></i>';
                            } else if (age < 120) {
                                color = '#fbbf24';
                                status = 'Aging';
                                icon = '<i class="bx bx-time" style="color:#fbbf24"></i>';
                            } else {
                                color = '#f87171';
                                status = 'Expiring';
                                icon = '<i class="bx bx-error-circle" style="color:#f87171"></i>';
                            }
                            html += `
                                <div class="token-row">
                                    <span class="token-text" style="color:${color}">${item.token}</span>
                                    <span class="token-meta">
                                        <span class="token-age"><i class='bx bx-clock'></i> ${age}s</span>
                                        <span class="token-status" style="color:${color}">${icon} ${status}</span>
                                    </span>
                                </div>
                            `;
                        });
                        tokenList.innerHTML = html;
                    } else {
                        tokenList.innerHTML = '<div class="empty-state"><i class="bx bx-inbox"></i> No tokens in queue</div>';
                    }
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                });
        }

        // Fetch immediately and then every 2 seconds
        fetchData();
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
